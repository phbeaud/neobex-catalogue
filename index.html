<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neobex — Catalogue 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--blue:#1B4F8A;--bpale:#E8F0FB;--green:#6BAC3F;--gpale:#EBF5E1;--g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;--g300:#CBD5E1;--g500:#64748B;--g700:#334155;--g900:#0F172A;--white:#fff;--red:#EF4444;--rpale:#FEF2F2;--r:10px;--sh1:0 1px 3px rgba(0,0,0,.08);--sh2:0 4px 16px rgba(27,79,138,.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--g50);color:var(--g900)}
.header{background:var(--white);border-bottom:3px solid var(--blue);position:sticky;top:0;z-index:100;box-shadow:var(--sh2)}
.hinner{max-width:1400px;margin:0 auto;padding:0 20px;display:flex;align-items:center;height:64px;gap:10px}
.logo{height:32px;width:auto;flex-shrink:0;display:block}

.hdiv{width:1px;height:26px;background:var(--g200);flex-shrink:0}
.htit{font-size:11px;font-weight:600;color:var(--g500);letter-spacing:.08em;text-transform:uppercase;flex-shrink:0}
.hsp{flex:1}
.sw{max-width:360px;width:100%;position:relative}
.sw svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--g500);pointer-events:none}
#search{width:100%;padding:8px 12px 8px 35px;border:1.5px solid var(--g200);border-radius:8px;font-family:inherit;font-size:13px;background:var(--g50);outline:none;transition:all .2s}
#search:focus{border-color:var(--blue);background:var(--white);box-shadow:0 0 0 3px rgba(27,79,138,.1)}
.hbtns{display:flex;gap:7px;align-items:center;flex-shrink:0}
.lt{display:flex;border:1.5px solid var(--g200);border-radius:8px;overflow:hidden}
.lb{padding:6px 11px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;border:none;background:var(--white);color:var(--g500);transition:all .15s}
.lb.act{background:var(--blue);color:var(--white)}
.btn{display:flex;align-items:center;gap:5px;padding:6px 11px;border:1.5px solid var(--g200);border-radius:8px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;color:var(--g500);background:var(--white);transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--blue);color:var(--blue)}
.btn.act{background:#FFF8E1;border-color:#F59E0B;color:#92400E}
.btn-cl{background:var(--blue)!important;color:var(--white)!important;border-color:var(--blue)!important}
.btn-cl:hover{background:#133a66!important}
.btn-pdf{background:var(--red)!important;color:var(--white)!important;border-color:var(--red)!important}
.ebar{display:none;background:#FFF8E1;border-bottom:2px solid #F59E0B;padding:8px 20px}
.ebar.on{display:block}
.ebinner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.estat{font-size:12px;color:#B45309;background:rgba(245,158,11,.15);padding:3px 9px;border-radius:20px;font-weight:600}
.btn-sm{padding:5px 11px;border:1.5px solid;border-radius:7px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
.btn-rst{border-color:#D97706;background:var(--white);color:#92400E}
.btn-add{border-color:var(--green);background:var(--gpale);color:#2d6a0f}
.layout{max-width:1400px;margin:0 auto;padding:16px 20px;display:flex;gap:16px;align-items:flex-start}
.sidebar{width:200px;flex-shrink:0;position:sticky;top:88px;max-height:calc(100vh - 100px);overflow-y:auto}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--g200);border-radius:3px}
.stit{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--g500);padding:0 0 7px;margin-bottom:3px;border-bottom:2px solid var(--g200)}
.cbt{display:block;width:100%;text-align:left;padding:7px 9px;margin:2px 0;border:none;background:transparent;font-family:inherit;font-size:12px;font-weight:500;color:var(--g700);cursor:pointer;border-radius:7px;transition:all .15s;line-height:1.3}
.cbt:hover{background:var(--bpale);color:var(--blue)}
.cbt.act{background:var(--blue);color:var(--white);font-weight:600}
.cbt .cnt{float:right;font-size:10px;opacity:.6;background:rgba(0,0,0,.08);padding:1px 5px;border-radius:10px}
.cbt.act .cnt{opacity:.8;background:rgba(255,255,255,.2)}
.content{flex:1;min-width:0}
.ri{font-size:12px;color:var(--g500);margin-bottom:12px;font-weight:500}
.ri strong{color:var(--blue)}
.sec{margin-bottom:24px}
.ch{display:flex;align-items:center;gap:9px;margin-bottom:10px;padding-bottom:7px;border-bottom:2px solid var(--blue)}
.ci{width:28px;height:28px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ci svg{color:white}
.cn{font-size:14px;font-weight:700;color:var(--blue)}
.tbl{width:100%;border-collapse:collapse;background:var(--white);border-radius:var(--r);box-shadow:var(--sh1);overflow:hidden;border:1px solid var(--g200)}
.tbl thead tr{background:var(--blue);color:var(--white)}
.tbl th{padding:9px 11px;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;text-align:left;white-space:nowrap}
.tbl tbody tr{border-bottom:1px solid var(--g100);transition:background .1s}
.tbl tbody tr:last-child{border-bottom:none}
.tbl tbody tr:hover{background:var(--g50)}
.tbl tbody tr:nth-child(even){background:#FAFBFD}
.tbl td{padding:8px 11px;font-size:12px;vertical-align:middle;line-height:1.4}
.td-img{width:62px;padding:5px 6px!important}
.td-img img{width:50px;height:50px;object-fit:contain;border-radius:5px;border:1px solid var(--g100);display:block}
.noimg{width:50px;height:50px;background:var(--g100);border-radius:5px;display:flex;align-items:center;justify-content:center;border:1px dashed var(--g300)}
.tdn{font-weight:600;color:var(--g900);font-size:12.5px}
.mil{display:inline-block;margin-left:4px;padding:1px 5px;background:var(--gpale);color:var(--green);font-size:10px;font-weight:700;border-radius:4px;vertical-align:middle}
.mod-badge{display:inline-block;margin-left:5px;padding:1px 5px;background:#FFF3CD;color:#856404;font-size:9px;border-radius:3px;vertical-align:middle}
.szl{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
.szc{background:var(--bpale);color:var(--blue);font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px;font-family:'DM Mono',monospace}
.skuc{display:flex;flex-direction:column;gap:2px}
.skur{display:flex;align-items:center;gap:4px}
.sku{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--blue);background:var(--bpale);padding:2px 6px;border-radius:4px}
.cpb{background:none;border:none;cursor:pointer;color:var(--g300);padding:2px;border-radius:3px;display:inline-flex;align-items:center;transition:all .15s}
.cpb:hover{color:var(--blue)}.cpb.ok{color:var(--green)}
.morebtn{background:none;border:none;font-family:inherit;font-size:11px;color:var(--blue);cursor:pointer;padding:2px 0;text-decoration:underline;display:block;margin-top:1px}
.hl{background:#FFF176;border-radius:2px;padding:0 1px}
.empty{text-align:center;padding:60px 20px;color:var(--g500)}
.footer{max-width:1400px;margin:14px auto 0;padding:16px 20px;text-align:center;color:var(--g500);font-size:11px;border-top:1px solid var(--g200)}
.col-act{display:none}.th-act{display:none}
body.edit .col-act{display:table-cell}
body.edit .th-act{display:table-cell}
.td-act{width:30px;padding:3px 5px!important;text-align:center;white-space:nowrap}
.ibtn{background:none;border:none;cursor:pointer;width:24px;height:24px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
.ibtn-hide{color:var(--g300)}
.ibtn-hide:hover{background:var(--rpale);color:var(--red)}
tr.hidden .ibtn-hide{color:var(--green);background:var(--gpale)}
tr.hidden{opacity:.3;background:var(--rpale)!important;text-decoration:line-through}
.ibtn-del{color:var(--g300)}
.ibtn-del:hover{background:var(--rpale);color:var(--red)}
.ibtn-edit{color:var(--g300)}
.ibtn-edit:hover{background:var(--bpale);color:var(--blue)}
body.edit .td-img{position:relative;cursor:pointer}
body.edit .td-img::after{content:'✎';position:absolute;top:4px;right:3px;background:var(--blue);color:white;font-size:9px;width:13px;height:13px;border-radius:3px;display:flex;align-items:center;justify-content:center;line-height:13px;text-align:center}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.mbg.on{display:flex}
.modal{background:var(--white);border-radius:12px;padding:22px;width:440px;max-width:96vw;box-shadow:0 20px 60px rgba(0,0,0,.25);max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--blue)}
.frow{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.frow label{font-size:11px;font-weight:600;color:var(--g500);text-transform:uppercase;letter-spacing:.05em}
.frow input,.frow select,.frow textarea{padding:8px 10px;border:1.5px solid var(--g200);border-radius:7px;font-family:inherit;font-size:13px;color:var(--g900);outline:none;transition:border-color .2s;width:100%}
.frow input:focus,.frow select:focus{border-color:var(--blue)}
.sku-edit-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.sku-edit-row{display:flex;gap:6px;align-items:center}
.sku-edit-row input{flex:1;padding:6px 8px;border:1.5px solid var(--g200);border-radius:6px;font-family:'DM Mono',monospace;font-size:12px;outline:none}
.sku-edit-row input:focus{border-color:var(--blue)}
.sku-del-btn{background:none;border:none;cursor:pointer;color:var(--g300);padding:4px;border-radius:4px;display:flex;align-items:center}
.sku-del-btn:hover{color:var(--red);background:var(--rpale)}
.btn-add-sku{padding:5px 10px;border:1.5px dashed var(--g300);border-radius:6px;background:transparent;font-family:inherit;font-size:12px;color:var(--g500);cursor:pointer;width:100%;text-align:center;transition:all .15s}
.btn-add-sku:hover{border-color:var(--blue);color:var(--blue)}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn-cancel{padding:8px 16px;border:1.5px solid var(--g200);border-radius:7px;background:var(--white);font-family:inherit;font-size:13px;font-weight:600;color:var(--g500);cursor:pointer}
.btn-save{padding:8px 16px;border:none;border-radius:7px;background:var(--blue);color:var(--white);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
.btn-danger{padding:8px 16px;border:none;border-radius:7px;background:var(--red);color:var(--white);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
.mprev{width:100%;height:110px;border:2px dashed var(--g200);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:12px;overflow:hidden;transition:border-color .2s}
.mprev:hover{border-color:var(--blue)}.mprev img{width:100%;height:100%;object-fit:contain}
.mprev-ph{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--g300);font-size:12px}
.bdl{padding:7px 14px;border:none;border-radius:7px;background:var(--rpale);color:var(--red);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer}
#finput{display:none}
.confirm-text{font-size:13px;color:var(--g700);margin-bottom:16px;line-height:1.5}
@media print{
  @page{size:A4;margin:10mm 8mm}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
  body{background:white!important}
  .header{position:static!important;box-shadow:none!important;border-bottom:2px solid #1B4F8A!important}
  .hbtns,.ebar,.sidebar,.col-act,.th-act,.ibtn,.cpb,.morebtn,.footer,.sw{display:none!important}
  .layout{padding:6px 0!important;display:block!important}
  .sec{margin-bottom:12px!important;page-break-inside:avoid}
  .tbl{box-shadow:none!important;border:1px solid #ccc!important}
  .tbl thead tr{background:#1B4F8A!important}
  .tbl thead th{color:white!important}
  .tbl tbody tr:nth-child(even){background:#F8FAFC!important}
  tr.hidden{display:none!important}
  .tbl td,.tbl th{padding:4px 7px!important;font-size:10px!important}
  .td-img{display:table-cell!important;width:50px!important;padding:3px!important}
  .td-img img{width:44px!important;height:44px!important;display:block!important;object-fit:contain!important}
  .noimg{display:none!important}
}
@media(max-width:900px){.sidebar,.td-img{display:none}.layout{padding:12px 16px}}

.btn.auth-on{background:#EBF5E1!important;border-color:#6BAC3F!important;color:#2d6a0f!important}
</style>
</head>

function supaHeaders(isAuth) {
  var h = { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' };
  if (isAuth && authToken) h['Authorization'] = 'Bearer ' + authToken;
  else h['Authorization'] = 'Bearer ' + SUPA_KEY;
  return h;
}

async function loadProducts() {
  try {
    var r = await fetch(SUPA_URL + '/rest/v1/products?select=*&order=sort_order.asc', {
      headers: supaHeaders(false)
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var data = await r.json();
    // Map DB rows to the P array format used by existing code
    P = data.map(function(row) {
      return {
        id: row.id,
        cat_en: row.cat_en,
        cat_fr: row.cat_fr,
        cat_en_label: row.cat_en_label,
        name_en: row.name_en,
        name_fr: row.name_fr,
        skus: row.skus || [],
        sizes: row.sizes || [],
        qty: row.qty || '',
        mil: row.mil || '',
        img: row.img_url || '',
        sort_order: row.sort_order || 0
      };
    });
    return true;
  } catch (e) {
    console.error('Load products error:', e);
    document.getElementById('body').innerHTML = '<div class="empty"><p style="color:var(--red)">Erreur de connexion au serveur. Rafraîchissez la page.</p></div>';
    return false;
  }
}

async function supaLogin(email, password) {
  var r = await fetch(SUPA_URL + '/auth/v1/token?grant_type=password', {
    method: 'POST',
    headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email, password: password })
  });
  var data = await r.json();
  if (!r.ok) throw new Error(data.error_description || data.msg || 'Échec de connexion');
  authToken = data.access_token;
  currentUser = data.user;
  localStorage.setItem('nbx_token', authToken);
  localStorage.setItem('nbx_refresh', data.refresh_token);
  localStorage.setItem('nbx_user', JSON.stringify(currentUser));
  return currentUser;
}

async function supaRefreshToken() {
  var refresh = localStorage.getItem('nbx_refresh');
  if (!refresh) return false;
  var r = await fetch(SUPA_URL + '/auth/v1/token?grant_type=refresh_token', {
    method: 'POST',
    headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ refresh_token: refresh })
  });
  if (!r.ok) return false;
  var data = await r.json();
  authToken = data.access_token;
  localStorage.setItem('nbx_token', authToken);
  localStorage.setItem('nbx_refresh', data.refresh_token);
  return true;
}

function supaLogout() {
  authToken = null;
  currentUser = null;
  localStorage.removeItem('nbx_token');
  localStorage.removeItem('nbx_refresh');
  localStorage.removeItem('nbx_user');
  if (editMode) toggleEdit();
  updateAuthUI();
}

function isLoggedIn() { return !!authToken; }

function updateAuthUI() {
  var btn = document.getElementById('auth-btn');
  var lbl = document.getElementById('auth-lbl');
  if (isLoggedIn()) {
    lbl.textContent = currentUser ? currentUser.email.split('@')[0] : 'Connecté';
    btn.title = 'Se déconnecter';
    btn.classList.add('auth-on');
  } else {
    lbl.textContent = 'Connexion';
    btn.title = 'Se connecter';
    btn.classList.remove('auth-on');
  }
  // Edit button only shown when logged in
  document.getElementById('etog').style.display = isLoggedIn() ? '' : 'none';
}

function openLoginModal() {
  if (isLoggedIn()) {
    if (confirm('Se déconnecter ?')) supaLogout();
    return;
  }
  document.getElementById('login-err').textContent = '';
  document.getElementById('login-email').value = '';
  document.getElementById('login-password').value = '';
  document.getElementById('login-modal').classList.add('on');
  setTimeout(function(){ document.getElementById('login-email').focus(); }, 100);
}

async function doLogin() {
  var email = document.getElementById('login-email').value.trim();
  var pw = document.getElementById('login-password').value;
  var errEl = document.getElementById('login-err');
  errEl.textContent = '';
  if (!email || !pw) { errEl.textContent = 'Email et mot de passe requis.'; return; }
  try {
    await supaLogin(email, pw);
    closeModal('login-modal');
    updateAuthUI();
  } catch (e) {
    errEl.textContent = e.message;
  }
}

// Restore session from localStorage
async function restoreSession() {
  var token = localStorage.getItem('nbx_token');
  var userStr = localStorage.getItem('nbx_user');
  if (token && userStr) {
    authToken = token;
    try { currentUser = JSON.parse(userStr); } catch(e){}
    // Try to verify by calling user endpoint
    try {
      var r = await fetch(SUPA_URL + '/auth/v1/user', { headers: supaHeaders(true) });
      if (!r.ok) {
        // Try refresh
        var ok = await supaRefreshToken();
        if (!ok) supaLogout();
      }
    } catch(e) {}
  }
}

// === DATA SYNC (Supabase writes) ===
async function supaInsertProduct(payload) {
  var r = await fetch(SUPA_URL + '/rest/v1/products', {
    method: 'POST',
    headers: Object.assign(supaHeaders(true), { 'Prefer': 'return=representation' }),
    body: JSON.stringify(payload)
  });
  if (!r.ok) { var e = await r.text(); throw new Error('Insert: ' + e); }
  var rows = await r.json();
  return rows[0];
}

async function supaUpdateProduct(id, patch) {
  var r = await fetch(SUPA_URL + '/rest/v1/products?id=eq.' + id, {
    method: 'PATCH',
    headers: Object.assign(supaHeaders(true), { 'Prefer': 'return=representation' }),
    body: JSON.stringify(patch)
  });
  if (!r.ok) { var e = await r.text(); throw new Error('Update: ' + e); }
  var rows = await r.json();
  return rows[0];
}

async function supaDeleteProduct(id) {
  var r = await fetch(SUPA_URL + '/rest/v1/products?id=eq.' + id, {
    method: 'DELETE',
    headers: supaHeaders(true)
  });
  if (!r.ok) { var e = await r.text(); throw new Error('Delete: ' + e); }
  return true;
}

async function supaUploadImage(file, productId) {
  var ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
  var filename = 'product-' + productId + '-' + Date.now() + '.' + ext;
  var r = await fetch(SUPA_URL + '/storage/v1/object/' + SUPA_BUCKET + '/' + filename, {
    method: 'POST',
    headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + authToken, 'Content-Type': file.type, 'x-upsert': 'true' },
    body: file
  });
  if (!r.ok) { var e = await r.text(); throw new Error('Upload: ' + e); }
  return SUPA_URL + '/storage/v1/object/public/' + SUPA_BUCKET + '/' + filename;
}

function requireLogin(action) {
  if (!isLoggedIn()) { openLoginModal(); return false; }
  return true;
}

    alert('Erreur: '+e.message);
  }finally{
    btn.disabled=false; btn.textContent='Enregistrer';

async function confirmDelete(){
  if(deleteIdx===null)return;
  if(!requireLogin())return;
  var id=P[deleteIdx].id;
  try{
    await supaDeleteProduct(id);
    P.splice(deleteIdx,1);
    closeModal('confirm-modal');
    nav();render();
    deleteIdx=null;
  }catch(e){
    alert('Erreur suppression: '+e.message);
  }
}

function toggleRow(i){
  var id=P[i].id;
  if(hidden.has(id))hidden.delete(id);else hidden.add(id);
  savePersonal();updH();
  var r=document.querySelector('tr[data-i="'+i+'"]');
  if(r){
    r.classList.toggle('hidden',hidden.has(id));
    var b=r.querySelector('.ibtn-hide');
    if(b)b.innerHTML=hidden.has(id)?eyeOff():eyeOn();
  }
}

function openImgModal(i){
  if(!editMode)return;
  if(!requireLogin())return;
  mIdx=i;pImg=null;pImgFile=null;
  var src=P[i].img||'';
  var prev=document.getElementById('mprev');
  if(src){prev.innerHTML='<img src="'+src+'" alt="">';}
  else{prev.innerHTML='<div class="mprev-ph"><svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>Cliquer pour choisir</span></div>';}
  document.getElementById('img-modal').classList.add('on');
}
function prevImg(inp){
  var f=inp.files[0];if(!f)return;
  pImgFile=f;
  var r=new FileReader();
  r.onload=function(e){pImg=e.target.result;document.getElementById('mprev').innerHTML='<img src="'+pImg+'" alt="">';};
  r.readAsDataURL(f);
}
async function applyImg(){
  if(!pImgFile||mIdx===null)return;
  var btn=document.querySelector('#img-modal .btn-save');
  btn.disabled=true; btn.textContent='Upload...';
  try{
    var id=P[mIdx].id;
    var url=await supaUploadImage(pImgFile,id);
    await supaUpdateProduct(id,{img_url:url});
    P[mIdx].img=url;
    var row=document.querySelector('tr[data-i="'+mIdx+'"]');
    if(row){var cell=row.querySelector('.td-img');if(cell)cell.innerHTML=imgHTML(mIdx,url);}
    closeModal('img-modal');
  }catch(e){
    alert('Erreur upload: '+e.message);
  }finally{
    btn.disabled=false; btn.textContent='Appliquer';
  }

async function delImg(){
  if(mIdx===null)return;
  if(!requireLogin())return;
  try{
    var id=P[mIdx].id;
    await supaUpdateProduct(id,{img_url:''});
    P[mIdx].img='';
    var row=document.querySelector('tr[data-i="'+mIdx+'"]');

function nav(){
  var cnt={};
  P.forEach(function(p){cnt[p.cat_en]=(cnt[p.cat_en]||0)+1;});
  var cs=[];
  P.forEach(function(p){if(cs.indexOf(p.cat_en)<0)cs.push(p.cat_en);});

function fp(){
  var r=[];
  P.forEach(function(p,i){
    if(ct!=='ALL'&&p.cat_en!==ct)return;
    if(q){
      var lq=q.toLowerCase();
      var nm=(lg==='fr'?p.name_fr:p.name_en)||'';
      if(nm.toLowerCase().indexOf(lq)<0&&!p.skus.some(function(s){return s.toLowerCase().indexOf(lq)>=0;}))return;
    }
    r.push(Object.assign({},p,{_i:i}));
  });
  return r;
}
